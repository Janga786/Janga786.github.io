<svg viewBox="0 0 860 420" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" role="img" aria-label="Hexapod system architecture: sensors into ATmega2560 firmware driving 18 servos, with a Kuramoto CPG simulator informing gait design">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="rgba(148,163,184,0.55)"/>
    </marker>
  </defs>
  <style>
    .box{fill:#151b25;stroke:rgba(148,163,184,0.35)}
    .t{fill:#e7eaf0;font-size:14px;font-weight:600}
    .s{fill:#94a0b4;font-size:11px}
    .lbl{fill:#7aa5ff;font-size:11px}
    .flow{stroke:rgba(148,163,184,0.55);stroke-width:1.5;fill:none}
    .dash{stroke:rgba(148,163,184,0.4);stroke-width:1.2;fill:none;stroke-dasharray:5 5}
  </style>

  <text x="30" y="36" class="s" letter-spacing="2">HEXAPOD SYSTEM — SENSORS → FIRMWARE → 18 DOF</text>

  <rect x="30" y="80" width="200" height="72" rx="10" class="box"/>
  <text x="50" y="108" class="t" font-size="13">ICM-20948 IMU</text>
  <text x="50" y="130" class="s">gyro + magnetometer fusion</text>

  <rect x="30" y="176" width="200" height="72" rx="10" class="box"/>
  <text x="50" y="204" class="t" font-size="13">Bump sensors</text>
  <text x="50" y="226" class="s">contact-triggered avoidance</text>

  <rect x="30" y="272" width="200" height="72" rx="10" class="box"/>
  <text x="50" y="300" class="t" font-size="13">3-bit command interface</text>
  <text x="50" y="322" class="s">selects 8 autonomous behaviors</text>

  <rect x="320" y="150" width="240" height="130" rx="10" class="box"/>
  <text x="340" y="180" class="t">ATmega2560 firmware</text>
  <text x="340" y="202" class="s">heading-hold P-controller</text>
  <text x="340" y="220" class="s">gyro bias auto-calibration</text>
  <text x="340" y="238" class="s">bump-avoidance state machine</text>
  <text x="340" y="260" class="s">behavior selection FSM</text>

  <path d="M230 116 C 280 116 280 180 316 185" class="flow" marker-end="url(#a)"/>
  <path d="M230 212 H 316" class="flow" marker-end="url(#a)"/>
  <path d="M230 308 C 280 308 280 250 316 245" class="flow" marker-end="url(#a)"/>

  <rect x="640" y="150" width="190" height="130" rx="10" class="box"/>
  <text x="660" y="180" class="t">18 servos</text>
  <text x="660" y="202" class="s">6 legs × 3 DoF</text>
  <text x="660" y="224" class="lbl">tripod · wave · ripple</text>
  <text x="660" y="246" class="s">gaits from one</text>
  <text x="660" y="262" class="s">dynamical system</text>

  <path d="M560 215 H 636" class="flow" marker-end="url(#a)"/>

  <rect x="320" y="330" width="240" height="64" rx="10" fill="#0d1117" stroke="rgba(148,163,184,0.3)"/>
  <text x="340" y="356" class="t" font-size="13">Kuramoto CPG simulator</text>
  <text x="340" y="376" class="s">Python · coupled oscillators · 34-test CI</text>
  <path d="M440 330 V 284" class="dash" marker-end="url(#a)"/>
  <text x="452" y="312" class="s">gait design</text>

  <text x="640" y="360" class="s">power: LiPo + SBEC rail,</text>
  <text x="640" y="378" class="s">LED battery indicator</text>
</svg>
