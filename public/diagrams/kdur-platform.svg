<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace" role="img" aria-label="KDUR data platform architecture: users, Power Apps CRUD application, and the applied AI research layer">
  <defs>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="rgba(148,163,184,0.55)"/>
    </marker>
  </defs>
  <style>
    .box{fill:#151b25;stroke:rgba(148,163,184,0.35)}
    .t{fill:#e7eaf0;font-size:14px;font-weight:600}
    .s{fill:#94a0b4;font-size:11px}
    .lbl{fill:#7aa5ff;font-size:11px}
    .flow{stroke:rgba(148,163,184,0.55);stroke-width:1.5;fill:none}
    .dash{stroke:rgba(148,163,184,0.4);stroke-width:1.2;fill:none;stroke-dasharray:5 5}
  </style>

  <text x="30" y="36" class="s" letter-spacing="2">KDUR DATA PLATFORM — DEPLOYED APP + APPLIED-AI LAYER</text>

  <rect x="30" y="90" width="200" height="96" rx="10" class="box"/>
  <text x="50" y="120" class="t">DJs &amp; station staff</text>
  <text x="50" y="142" class="lbl">60+ daily users</text>
  <text x="50" y="160" class="s">library · schedules · analytics</text>

  <rect x="330" y="90" width="220" height="96" rx="10" class="box"/>
  <text x="350" y="120" class="t">Power Apps platform</text>
  <text x="350" y="142" class="s">CRUD app in production</text>
  <text x="350" y="160" class="s">songs · albums · DJs · shows</text>

  <path d="M230 138 H326" class="flow" marker-end="url(#a)"/>
  <path d="M330 158 H234" class="flow" marker-end="url(#a)" transform="translate(0,10)"/>

  <rect x="640" y="60" width="190" height="84" rx="10" class="box"/>
  <text x="660" y="88" class="t" font-size="13">Vector embeddings</text>
  <text x="660" y="108" class="s">artist-name resolution</text>
  <text x="660" y="126" class="s">"Jay Z" → "Jay-Z" · royalties</text>

  <rect x="640" y="180" width="190" height="84" rx="10" class="box"/>
  <text x="660" y="208" class="t" font-size="13">Neo4j prototype</text>
  <text x="660" y="228" class="s">graph of catalog relations</text>
  <text x="660" y="246" class="s">NL → Cypher agents</text>

  <path d="M550 118 C 600 118 600 100 636 100" class="dash" marker-end="url(#a)"/>
  <path d="M550 158 C 600 158 600 220 636 220" class="dash" marker-end="url(#a)"/>
  <text x="562" y="86" class="s">research layer</text>

  <text x="30" y="320" class="s">deployed platform is in production use; the AI layer is a research prototype —</text>
  <text x="30" y="340" class="s">natural-language access to the catalog for students and community.</text>
</svg>
